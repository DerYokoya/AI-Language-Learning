<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Language Learning Assistant</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <header>
        <div class="logo-container">
          <img src="logo.svg" alt="LL Logo" class="logo" />
        </div>
        <!-- Auth nav is injected here by auth.js -->
        <div id="auth-nav"></div>
        <br />
        <button id="listen-practice-btn">🎧 Listening Practice</button>
        <button id="flashcard-btn">📇 Generate Flashcards</button>
        <button id="theme-toggle-btn">🌙 Dark Mode</button>
        <button id="clear-chat-btn">🗑️ Clear Chat</button>

        <div class="chat-session-bar">
          <div class="chat-select-wrap">
            <label for="chat-select">Chat</label>
            <select id="chat-select"></select>
          </div>
          <button id="rename-chat-btn">Rename</button>
          <button id="new-chat-btn">+ New Chat</button>
          <button id="delete-chat-btn">Delete Chat</button>
        </div>

        <!-- Learning Mode Buttons -->
        <div class="mode-selector">
          <button id="mode-conversation" class="mode-btn active-mode">
            💬 Conversation
          </button>
          <button id="mode-grammar" class="mode-btn">📝 Grammar</button>
          <button id="mode-vocabulary" class="mode-btn">📚 Vocabulary</button>
          <button id="mode-roleplay" class="mode-btn">🎭 Roleplay</button>
        </div>

        <div class="roleplay-container" style="display: none">
          <select id="roleplay-scenario">
            <option value="restaurant">🍽️ Restaurant</option>
            <option value="airport">✈️ Airport</option>
            <option value="hotel">🏨 Hotel</option>
            <option value="shopping">🛍️ Shopping Mall</option>
            <option value="doctor">🏥 Doctor's Office</option>
            <option value="jobInterview">💼 Job Interview</option>
            <option value="taxi">🚕 Taxi</option>
            <option value="phoneCall">📞 Phone Call</option>
          </select>
        </div>
        <br />
      </header>
      <div class="chat-container">
        <div id="chat-window"></div>

        <div class="input-area">
          <button id="mic-btn">🎤</button>
          <button id="tts-toggle-btn" class="tts-toggle">🔊 Auto-Read</button>
          <button id="tts-replay-btn">🔁 Replay Last Message</button>
          <button id="tts-stop-btn">⛔ Stop Voice</button>

          <select id="language-select">
            <option value="Spanish">Spanish</option>
            <option value="French">French</option>
            <option value="German">German</option>
            <option value="Italian">Italian</option>
            <option value="Japanese">Japanese</option>
            <option value="Korean">Korean</option>
            <option value="Mandarin Chinese">Mandarin Chinese</option>
          </select>

          <select id="difficulty-select">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>

          <input
            id="user-input"
            type="text"
            placeholder="Type your message..."
          />
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">
      import { initAuth } from "/js/auth.js";
      // Auth must resolve before main so window.currentUser is set
      await initAuth();
      // Dynamic import ensures main.js runs after auth state is known
      await import("/js/main.js");
    </script>
  </body>
</html>
